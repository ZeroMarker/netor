name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, nightly]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install Npcap SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile npcap-sdk.zip
          Expand-Archive -Path npcap-sdk.zip -DestinationPath npcap-sdk
          echo "LIB=${{ github.workspace }}\npcap-sdk\Lib\x64" >> $env:GITHUB_ENV

      - name: Install Npcap (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-1.80.exe" -OutFile npcap.exe
          Start-Process -FilePath .\npcap.exe -ArgumentList '/S' -Wait
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Clippy (Linux)
        if: runner.os == 'Linux'
        run: cargo clippy --all-targets --all-features -- -D warnings
      
      - name: Clippy (Windows)
        if: runner.os == 'Windows'
        run: cargo clippy --all-targets --all-features -- -D warnings
      
      - name: Clippy (macOS)
        if: runner.os == 'macOS'
        run: cargo clippy --all-targets --no-default-features -- -D warnings
      
      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: cargo test --verbose
      
      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: cargo test --verbose
      
      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        run: cargo test --verbose --no-default-features
      
      - name: Build
        run: cargo build --release --verbose

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      
      - name: Generate coverage
        run: cargo tarpaulin --out xml --output-dir coverage
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false